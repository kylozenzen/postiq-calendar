<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PostIQ Calendar (Leadership Ready)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="app-header">
      <h1>PostIQ Calendar</h1>
      <p class="subtitle">Plan, import, and generate leadership-ready links.</p>
    </header>

    <div id="editorView">
      <section class="toolbar">
        <div class="toolbar-left">
          <label class="field-label" for="weekStartInput">Week starting</label>
          <input type="date" id="weekStartInput" />
        </div>

        <div class="toolbar-right">
          <input id="apiKeyInput" type="password" placeholder="Buffer API Key" />
          <button id="syncBufferBtn" class="btn btn-primary">Import Scheduled Posts</button>
          <button id="generateLeadershipBtn" class="btn btn-secondary">Generate Leadership Link</button>
        </div>
      </section>

      <section>
        <div id="weekLabel" class="week-label"></div>
        <div id="calendar" class="calendar"></div>
      </section>
    </div>

    <!-- Leadership View -->
    <div id="leadershipView" class="hidden">
      <h2>Weekly Content Calendar</h2>
      <p class="subtitle">Read-only leadership overview</p>
      <div id="leadershipCalendar"></div>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
