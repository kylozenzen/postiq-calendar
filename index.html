
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PostIQ Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="header">
      <h1>PostIQ Calendar</h1>
      <p class="sub">Plan, import, and generate leadership-ready links.</p>
    </header>

    <div id="editorView">
      <section class="controls">
        <div class="left">
          <label for="weekStartInput">Week starting</label>
          <input type="date" id="weekStartInput" />
        </div>
        <div class="right">
          <input id="apiKeyInput" type="password" placeholder="Buffer API Key" />
          <button id="syncBufferBtn" class="btn primary">Import Scheduled Posts</button>
          <button id="generateLeadershipBtn" class="btn secondary">Generate Leadership Link</button>
        </div>
      </section>

      <section>
        <div id="errorBanner" class="error hidden"></div>
        <div id="loadingBanner" class="loading hidden">Importing scheduled posts…</div>
      </section>

      <section>
        <div id="weekLabel" class="weekLabel"></div>
        <div id="calendar" class="calendar"></div>
      </section>
    </div>

    <div id="leadershipView" class="hidden">
      <header class="leadHeader">
        <h2>Weekly Social Content Overview</h2>
        <p>This summary includes all scheduled posts extracted directly from Buffer, along with additional planned initiatives for the week.</p>
      </header>

      <div id="summaryBar" class="summaryBar"></div>
      <div id="leadershipCalendar" class="calendar light"></div>
    </div>

  </main>
  <script src="script.js" defer></script>
</body>
</html>
